# ════════════════════════════════════════
# application-test.properties
# Activate with: spring.profiles.active=test
# ════════════════════════════════════════
app.scheduler.cron=0 * * * * *
app.scheduler.mode=TEST
logging.level.com.sipapp.scheduler=DEBUG
logging.level.com.sipapp.service=DEBUG


