# src/main/resources/application-test.properties
# ─── TEST profile ───────────────────────────────
app.scheduler.cron=*/5 * * * * *
# ↑ runs every 1 minute (second=0, every minute)
app.scheduler.mode=TEST
logging.level.com.sipapp.scheduler=DEBUG


# Option A: change application.properties (simplest)
#spring.profiles.active=test    # ← for development
#spring.profiles.active=prod    # ← for production

# Option B: pass as JVM argument at startup (best for CI/CD)
#java -jar sip-banking.jar -Dspring.profiles.active=prod

# Option C: environment variable (best for Docker/cloud)
#export SPRING_PROFILES_ACTIVE=prod
#java -jar sip-banking.jar


# Format:  second  minute  hour  day  month  weekday
#0 * * * * *        → every 1 minute   (TEST)
#0 */5 * * * *      → every 5 minutes
#0 0 0 * * *        → daily at midnight (PROD)
#0 0 9 * * MON      → every Monday 9am
#0 0 1 1 * *        → 1st of every month at 1am


